version: 2

models:
  - name: dim_customers
    description: "Conformed customer dimension. One row per customer."
    columns:
      - name: customer_id
        description: "Natural key identifying the customer."
        tests:
          - not_null
          - unique

      - name: first_name
        description: "Customer's first name."

      - name: last_name
        description: "Customer's last name."

      - name: email
        description: "Customer's email address, cleaned and lowercased."

      - name: signup_date
        description: "Timestamp when the customer was created in the source system."

      - name: signup_month
        description: "Month bucket for customer signup."

      - name: signup_year
        description: "Year the customer signed up."

  - name: dim_products
    description: "Conformed product dimension. One row per product."
    columns:
      - name: product_id
        description: "Natural key identifying the product."
        tests:
          - not_null
          - unique

      - name: product_name
        description: "Name of the product."

      - name: category
        description: "Product category."

      - name: price
        description: "Current product price, cleaned and type-cast."

  - name: fct_orders
    description: "Fact table representing customer orders. One row per order."
    columns:
      - name: order_id
        description: "Degenerate dimension key for the order."
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Foreign key to dim_customers."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: order_date
        description: "Timestamp when the order was placed."

      - name: order_month
        description: "Month bucket for order date."

      - name: order_year
        description: "Year the order was placed."

  - name: fct_order_items
    description: "Fact table representing individual items within each order. One row per order item."
    columns:
      - name: order_item_id
        description: "Degenerate dimension key for the order item."
        tests:
          - not_null
          - unique

      - name: order_id
        description: "Foreign key to fct_orders."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id

      - name: product_id
        description: "Foreign key to dim_products."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

      - name: quantity
        description: "Number of units purchased for this item."

      - name: unit_price
        description: "Price per unit at the time of purchase."

      - name: extended_price
        description: "Total price for this line item (quantity × unit_price)."